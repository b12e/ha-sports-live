name: builder
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0). Defaults to value in config.yaml."
        required: false
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64, armv7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: version
        run: |
          set -e
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep '^version:' sports_live/config.yaml | head -1 | awk -F'"' '{print $2}')
            echo "version=${v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug — inspect what the builder container will see
        run: |
          echo "github.workspace = $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"
          echo "--- sports_live/ ---"
          ls -la "$GITHUB_WORKSPACE/sports_live"
          echo "--- builder image probe ---"
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/data \
            --entrypoint /bin/sh \
            ghcr.io/home-assistant/${{ matrix.arch }}-builder:2024.08.2 \
            -c 'pwd; ls -la /data; ls -la /data/sports_live; echo "--- config.yaml head: ---"; head -5 /data/sports_live/config.yaml'

      - name: Build add-on
        uses: home-assistant/builder@2024.08.2
        with:
          args: |
            --${{ matrix.arch }}
            --target /data/sports_live
            --image "ghcr.io/${{ github.repository_owner }}/{arch}-addon-sports-live"
            --version ${{ steps.version.outputs.version }}
            --addon
