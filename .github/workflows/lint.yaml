name: lint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check sports_live
      - run: pytest -q

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sports_live/Dockerfile
          # DL3006: base image is parameterized via `ARG BUILD_FROM` (HA
          # builder injects the per-arch tag at build time) so we can't
          # pin it in the Dockerfile.
          ignore: DL3006,DL3008,DL3018
