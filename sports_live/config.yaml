name: Sports Live
version: "0.1.3"
slug: sports_live
image: ghcr.io/b12e/{arch}-addon-sports-live
description: >-
  Reactive lighting for live football matches. Syncs your Home Assistant
  lights with goals, cards, and team colors during the 2026 World Cup —
  no Hue Bridge required.
url: https://github.com/b12e/ha-sports-live
arch:
  - aarch64
  - amd64
init: false
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:soccer-field
panel_title: Sports Live
panel_admin: false
services:
  - "mqtt:want"
map:
  - share:rw
options:
  log_level: info
  poll_interval_idle_s: 10
  poll_interval_live_s: 8
  poll_interval_burst_s: 2
  default_tv_delay_s: 0
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  poll_interval_idle_s: int(5,60)
  poll_interval_live_s: int(2,30)
  poll_interval_burst_s: int(1,10)
  default_tv_delay_s: int(0,60)
